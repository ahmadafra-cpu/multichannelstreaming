<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi-Camera Live View</title>
<script src="./vendor/mpegts.js"></script>
<script src="./app.js" defer></script>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:#101828; }
  body{ background:#0C111D; }
  button{ font-family:inherit; }
  input{ font-family:inherit; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#cbd2da; border-radius:8px; border:2px solid transparent; background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover{ background:#aeb7c2; background-clip:padding-box; }
  .dk::-webkit-scrollbar-thumb{ background:#2a3647; background-clip:padding-box; }
  @keyframes mcv-rec { 0%,100%{ opacity:1; } 50%{ opacity:.2; } }
  @keyframes mcv-shimmer { 0%{ background-position:-180% 0; } 100%{ background-position:180% 0; } }
  @keyframes mcv-flash { 0%{ opacity:.95; } 100%{ opacity:0; } }
  @keyframes mcv-spin { to { transform:rotate(360deg); } }
  @keyframes mcv-scan { 0%{ transform:translateY(-10%); } 100%{ transform:translateY(1100%); } }

  /* ---------- Login ---------- */
  #login{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%, #15233a 0%, #0C111D 60%); padding:24px; }
  .login-card{ width:100%; max-width:392px; background:#fff; border-radius:16px; padding:28px 28px 24px;
    box-shadow:0 24px 60px rgba(0,0,0,.45); }
  .login-logo{ width:46px; height:46px; border-radius:12px; background:#136AB6; display:flex; align-items:center;
    justify-content:center; color:#fff; margin-bottom:16px; }
  .login-card h1{ font-size:20px; font-weight:600; margin:0 0 4px; color:#101828; }
  .login-card p.sub{ font-size:13.5px; color:#667085; margin:0 0 22px; line-height:1.5; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; color:#344054; margin-bottom:6px; }
  .field input{ width:100%; height:42px; padding:0 12px; border:1px solid #D0D5DD; border-radius:9px;
    font-size:14px; color:#101828; outline:none; transition:border-color .15s, box-shadow .15s; }
  .field input:focus{ border-color:#136AB6; box-shadow:0 0 0 4px rgba(19,106,182,.16); }
  .btn-primary{ width:100%; height:44px; border:none; border-radius:9px; background:#136AB6; color:#fff;
    font-size:14.5px; font-weight:600; cursor:pointer; transition:background .15s; margin-top:6px; }
  .btn-primary:hover{ background:#115C9E; }
  .btn-primary:disabled{ opacity:.65; cursor:default; }
  .login-error{ display:none; align-items:center; gap:8px; background:#FEF3F2; border:1px solid #FECDCA;
    color:#B42318; font-size:13px; font-weight:500; padding:10px 12px; border-radius:9px; margin-bottom:16px; }
  .login-error.show{ display:flex; }

  /* ---------- App shell ---------- */
  #app{ display:none; height:100vh; flex-direction:column; }
  .topbar{ height:46px; flex:none; background:#101828; display:flex; align-items:center; gap:12px; padding:0 16px;
    border-bottom:1px solid #1d2738; }
  .topbar .brand{ display:flex; align-items:center; gap:9px; color:#fff; font-size:14px; font-weight:600; }
  .topbar .brand .mk{ width:24px; height:24px; border-radius:6px; background:#136AB6; display:flex; align-items:center; justify-content:center; color:#fff; }
  .topbar .db{ font-size:12px; color:#98A2B3; padding:3px 9px; border-radius:9999px; background:#1d2738; }
  .topbar .spacer{ flex:1; }
  .topbar .user{ font-size:12.5px; color:#cdd9ea; max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topbar .logout{ display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 12px; border-radius:8px;
    border:1px solid #2a3647; background:transparent; color:#cdd9ea; font-size:12.5px; font-weight:600; cursor:pointer; }
  .topbar .logout:hover{ background:#1d2738; color:#fff; }
  .topbar .logout > span{ display:flex; width:15px; height:15px; flex:none; }
  .login-error > span:first-child{ display:flex; width:16px; height:16px; flex:none; }
  .login-logo > svg{ width:26px; height:26px; }

  .shell{ flex:1; display:flex; min-height:0; }

  /* units panel */
  .panel{ width:344px; flex:none; background:#fff; border-right:1px solid #EAECF0; display:flex; flex-direction:column; min-height:0; }
  .panel-head{ padding:16px 16px 12px; border-bottom:1px solid #F2F4F7; }
  .panel-title{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .panel-title .left{ display:flex; align-items:baseline; gap:8px; }
  .panel-title .left b{ font-size:16px; font-weight:600; color:#101828; }
  .panel-title .left span{ font-size:13px; color:#98A2B3; font-weight:500; }
  .chip-green{ display:flex; align-items:center; gap:6px; padding:3px 9px; border-radius:9999px; background:#ECFDF3; }
  .chip-green span.dot{ width:7px; height:7px; border-radius:50%; background:#12B76A; }
  .chip-green span.txt{ font-size:12px; font-weight:600; color:#027A48; }
  .search-wrap{ position:relative; margin-bottom:10px; }
  .search-wrap .ic{ position:absolute; left:11px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:#98A2B3; display:flex; }
  .search-wrap input{ width:100%; height:40px; padding:0 12px 0 36px; border:1px solid #D0D5DD; border-radius:8px;
    font-size:14px; color:#101828; outline:none; }
  .search-wrap input:focus{ border-color:#136AB6; box-shadow:0 0 0 4px rgba(19,106,182,.16); }
  .seg{ display:flex; gap:4px; background:#F2F4F7; padding:3px; border-radius:9px; }
  .seg button{ flex:1; padding:7px 0; border:none; border-radius:7px; cursor:pointer; font-size:12.5px; font-weight:500;
    background:transparent; color:#667085; transition:all .15s; }
  .seg button.on{ background:#fff; color:#136AB6; font-weight:600; box-shadow:0 1px 2px rgba(16,24,40,.08); }
  .unit-list{ flex:1; overflow-y:auto; padding:6px; }
  .unit-card{ padding:11px; border-radius:11px; margin-bottom:6px; border:1px solid #F2F4F7; background:#fff;
    transition:background .15s, border-color .15s; user-select:none; }
  .unit-card .row1{ display:flex; align-items:center; gap:7px; }
  .unit-card .name{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .unit-card .row2{ display:flex; align-items:center; gap:5px; margin-top:4px; margin-left:16px; color:#98A2B3; }
  .unit-card .row2 .ic{ display:flex; width:12px; height:12px; flex:none; }
  .unit-card .sub{ font-size:12px; color:#667085; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge{ flex:none; padding:1px 8px; border-radius:9999px; font-size:10.5px; font-weight:600; }
  .pill{ display:inline-flex; align-items:center; gap:5px; flex:none; white-space:nowrap; padding:3px 9px;
    border-radius:9999px; font-size:11px; font-weight:600; font-variant-numeric:tabular-nums; }
  .pill .ic{ display:flex; width:12px; height:12px; }
  .empty-note{ padding:48px 24px; text-align:center; color:#98A2B3; font-size:13px; }

  /* grid area */
  .grid-area{ flex:1; display:flex; flex-direction:column; min-width:0; background:#0C111D; }
  .grid-toolbar{ height:56px; flex:none; background:#fff; border-bottom:1px solid #EAECF0; display:flex;
    align-items:center; padding:0 16px; gap:14px; }
  .grid-toolbar .glabel{ font-size:14px; font-weight:600; color:#101828; }
  .rec-chip{ display:flex; align-items:center; gap:5px; padding:3px 9px; border-radius:9999px; background:#FEF3F2; border:1px solid #FECDCA; }
  .rec-chip .dot{ width:7px; height:7px; border-radius:50%; background:#F04438; animation:mcv-rec 1.4s infinite; }
  .rec-chip .txt{ font-size:12px; font-weight:600; color:#B42318; font-variant-numeric:tabular-nums; }
  .layout-seg{ display:flex; gap:3px; background:#F2F4F7; padding:3px; border-radius:9px; }
  .layout-seg button{ min-width:38px; padding:6px 9px; border:none; border-radius:7px; cursor:pointer; font-size:12px;
    font-weight:500; background:transparent; color:#667085; transition:all .15s; font-variant-numeric:tabular-nums; }
  .layout-seg button.on{ background:#fff; color:#136AB6; font-weight:600; box-shadow:0 1px 2px rgba(16,24,40,.08); }
  .tb-divider{ width:1px; height:24px; background:#EAECF0; }
  .btn-clear{ display:inline-flex; align-items:center; gap:7px; height:38px; padding:0 13px; border-radius:8px;
    background:#fff; border:1px solid #D0D5DD; color:#475467; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; }
  .btn-clear:hover:not(:disabled){ background:#FEF3F2; border-color:#FDA29B; color:#B42318; }
  .btn-clear .ic{ display:flex; width:16px; height:16px; }
  .btn-clear:disabled{ color:#C0C7D0; opacity:.6; cursor:default; }
  .canvas{ flex:1; overflow-y:auto; padding:16px; min-height:0; }

  .empty-grid{ height:100%; min-height:420px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:8px; }
  .empty-grid .bx{ width:84px; height:84px; border-radius:20px; background:#15233a; display:flex; align-items:center; justify-content:center; color:#3a567a; margin-bottom:6px; }
  .empty-grid .bx .ic{ display:flex; width:40px; height:40px; }
  .empty-grid h2{ font-size:17px; font-weight:600; color:#E4E7EC; margin:0; }
  .empty-grid p{ font-size:13.5px; color:#667085; max-width:340px; line-height:1.5; margin:0; }

  /* tile */
  .tile{ position:relative; display:flex; flex-direction:column; border-radius:10px; overflow:hidden;
    background:#0a0e16; border:1px solid #1d2738; box-shadow:0 4px 12px rgba(0,0,0,.4); }
  .tile.focused{ border-color:#136AB6; }
  .tile video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#05080d; z-index:0; }
  .tile .scan{ position:absolute; left:0; right:0; height:14%; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(120,170,255,.10), transparent); animation:mcv-scan 4.5s linear infinite; }
  .tile .vig{ position:absolute; inset:0; z-index:1; pointer-events:none; box-shadow:inset 0 0 60px rgba(0,0,0,.45); }
  .tile-top{ position:relative; z-index:2; display:flex; align-items:flex-start; justify-content:space-between;
    padding:9px 10px; background:linear-gradient(180deg, rgba(6,9,14,.72), transparent); }
  .tag-live{ display:flex; align-items:center; gap:4px; padding:2px 6px; border-radius:5px; background:rgba(240,68,56,.92); }
  .tag-live .dot{ width:6px; height:6px; border-radius:50%; background:#fff; animation:mcv-rec 1.3s infinite; }
  .tag-live .t{ font-size:9.5px; font-weight:700; letter-spacing:.06em; color:#fff; }
  .tile-name{ font-size:12.5px; font-weight:600; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.6);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tile-chan{ display:inline-flex; align-items:center; gap:4px; align-self:flex-start; padding:2px 7px; border-radius:9999px;
    background:rgba(12,17,29,.6); backdrop-filter:blur(2px); margin-top:3px; }
  .tile-chan .ic{ display:flex; width:11px; height:11px; color:#9ec6ff; }
  .tile-chan .t{ font-size:10.5px; font-weight:500; color:#cdd9ea; }
  .bars{ display:flex; align-items:flex-end; gap:2px; height:15px; padding-top:2px; }
  .bars span{ width:3px; border-radius:1px; }
  .tile-bottom{ position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between;
    padding:9px 10px; background:linear-gradient(0deg, rgba(6,9,14,.78), transparent); }
  .tile-clock{ font-size:11px; font-weight:600; color:#fff; font-variant-numeric:tabular-nums; text-shadow:0 1px 2px rgba(0,0,0,.6); }
  .tile-date{ font-size:9.5px; color:#aeb9c7; font-variant-numeric:tabular-nums; }
  .tctrl{ width:28px; height:28px; border-radius:7px; border:none; background:rgba(20,28,42,.78); color:#dbe4ef;
    cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s, color .15s; }
  .tctrl .ic{ display:flex; width:15px; height:15px; }
  .tctrl:hover{ background:#136AB6; color:#fff; }
  .tctrl.danger:hover{ background:#F04438; color:#fff; }
  .tile-overlay{ position:absolute; inset:0; z-index:4; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; }
  .tile-overlay.connecting{ background:linear-gradient(110deg,#11161f 30%,#1b2330 50%,#11161f 70%);
    background-size:200% 100%; animation:mcv-shimmer 1.1s linear infinite; }
  .tile-overlay .spin{ width:26px; height:26px; border-radius:50%; border:3px solid #2a3647; border-top-color:#3a8bcc; animation:mcv-spin .8s linear infinite; }
  .tile-overlay .msg{ font-size:11.5px; color:#8a97a8; font-weight:500; }
  .tile-overlay.error{ background:#11161f; }
  .tile-overlay.error .emsg{ font-size:12px; color:#FDA29B; font-weight:600; }
  .tile-overlay.error .esub{ font-size:11px; color:#8a97a8; max-width:80%; text-align:center; }
  .tile-overlay.error button{ margin-top:4px; height:30px; padding:0 14px; border-radius:7px; border:1px solid #2a3647;
    background:#1b2330; color:#cdd9ea; font-size:12px; font-weight:600; cursor:pointer; }
  .tile-overlay.error button:hover{ background:#136AB6; color:#fff; border-color:#136AB6; }
  .tile-flash{ position:absolute; inset:0; z-index:5; background:#fff; animation:mcv-flash .5s ease-out forwards; pointer-events:none; }
</style>
</head>
<body>

<!-- ░░ LOGIN ░░ -->
<div id="login">
  <form class="login-card" id="loginForm" autocomplete="on">
    <div class="login-logo" id="loginLogo"></div>
    <h1>Multi-Camera Live View</h1>
    <p class="sub">Sign in with your Trax credentials to stream your fleet's cameras.</p>
    <div class="login-error" id="loginError"><span id="loginErrIc"></span><span id="loginErrTxt"></span></div>
    <div class="field">
      <label for="f-db">Database</label>
      <input id="f-db" name="database" type="text" placeholder="e.g. Safety Company" autocomplete="organization" required>
    </div>
    <div class="field">
      <label for="f-user">Username</label>
      <input id="f-user" name="username" type="text" placeholder="you@company.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="f-pass">Password</label>
      <input id="f-pass" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button class="btn-primary" id="loginBtn" type="submit">Sign in</button>
  </form>
</div>

<!-- ░░ APP ░░ -->
<div id="app">
  <div class="topbar">
    <div class="brand"><span class="mk" id="brandMk"></span>Multi-Camera Live View</div>
    <span class="db" id="dbName"></span>
    <span class="spacer"></span>
    <span class="user" id="userName"></span>
    <button class="logout" id="logoutBtn"><span id="logoutIc"></span>Logout</button>
  </div>
  <div class="shell">
    <!-- units -->
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <div class="left"><b>Units</b><span id="unitCount">0 total</span></div>
          <div class="chip-green"><span class="dot"></span><span class="txt" id="streamableCount">0 streamable</span></div>
        </div>
        <div class="search-wrap">
          <span class="ic" id="searchIc"></span>
          <input id="searchInput" placeholder="Search units…" autocomplete="off">
        </div>
        <div class="seg" id="filterSeg"></div>
      </div>
      <div class="unit-list dk" id="unitList"></div>
    </section>
    <!-- grid -->
    <section class="grid-area">
      <div class="grid-toolbar">
        <span class="glabel">Live grid</span>
        <span class="rec-chip"><span class="dot"></span><span class="txt" id="streamingCount">0 streaming</span></span>
        <span class="spacer" style="flex:1"></span>
        <span style="font-size:12px; color:#98A2B3; font-weight:500;">Layout</span>
        <div class="layout-seg" id="layoutSeg"></div>
        <span class="tb-divider"></span>
        <button class="btn-clear" id="clearBtn" disabled><span class="ic" id="clearIc"></span>Clear</button>
      </div>
      <div class="canvas dk" id="canvas"></div>
    </section>
  </div>
</div>

</body>
</html>
